services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    user: root
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    volumes:
      - dynamodb-data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/8000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build: ./backend
    container_name: dynamo-backend
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
      DYNAMODB_ENDPOINT: http://dynamodb:8000
    depends_on:
      dynamodb:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: dynamo-frontend
    networks:
      - internal
    restart: unless-stopped

  gateway:
    image: caddy:alpine
    container_name: dynamo-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
    restart: unless-stopped

volumes:
  dynamodb-data:

networks:
  internal:
    driver: bridge
